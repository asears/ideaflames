<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timeless Quotes | ideaflames</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Bebas+Neue&family=Cinzel:wght@500;700&family=Space+Grotesk:wght@400;700&family=Caveat:wght@600&family=Orbitron:wght@500;700&family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Pacifico&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #d4a74a;
      --accent-rgb: 212,167,74;
      --quote-font: 'Playfair Display', serif;
    }

    html, body {
      height: 100%;
      background: #060c14;
      color: #f0e6d0;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    /* ── WebGL background canvas ──────────── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── Top nav bar ─────────────────────── */
    #topNav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.55rem 1.1rem;
      background: rgba(6,12,20,0.7);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    #topNav a {
      color: rgba(240,230,208,0.7);
      text-decoration: none;
      font-size: 0.83rem;
      transition: color 0.2s;
    }
    #topNav a:hover { color: var(--accent); }
    #topNav .sep { opacity: 0.3; }
    #topNav .logo {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.06em;
    }
    #ctrlToggle {
      margin-left: auto;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #f0e6d0;
      padding: 0.28rem 0.7rem;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.2s;
    }
    #ctrlToggle:hover { background: rgba(212,167,74,0.2); }

    /* ── Controls panel ──────────────────── */
    #controlsPanel {
      position: fixed;
      top: 44px; right: 0;
      width: min(340px, 92vw);
      max-height: calc(100vh - 44px);
      overflow-y: auto;
      z-index: 25;
      background: rgba(10,16,28,0.92);
      backdrop-filter: blur(14px);
      border-left: 1px solid rgba(255,255,255,0.08);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      transform: translateX(100%);
      transition: transform 0.28s ease;
    }
    #controlsPanel.open { transform: none; }

    .ctrl-label {
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(240,230,208,0.5);
      margin-bottom: 0.35rem;
    }

    #searchInput {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      padding: 0.5rem 0.7rem;
      color: #f0e6d0;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: rgba(240,230,208,0.35); }

    #searchResults {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      max-height: 140px;
      overflow-y: auto;
    }
    .search-result-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 0.35rem 0.55rem;
      color: #f0e6d0;
      cursor: pointer;
      text-align: left;
      font-size: 0.78rem;
      font-family: inherit;
      transition: background 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    .search-result-btn:hover { background: rgba(212,167,74,0.15); border-color: var(--accent); }

    /* Font picker */
    #fontPills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .font-pill {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 0.25rem 0.7rem;
      color: #f0e6d0;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .font-pill:hover, .font-pill.active {
      background: rgba(212,167,74,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Effect & speed */
    .ctrl-select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      padding: 0.4rem 0.6rem;
      color: #f0e6d0;
      font-family: inherit;
      font-size: 0.87rem;
      outline: none;
      cursor: pointer;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    /* Nav buttons */
    .nav-btns {
      display: flex;
      gap: 0.4rem;
    }
    .nav-btns button {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #f0e6d0;
      padding: 0.4rem 0.3rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      transition: background 0.2s;
    }
    .nav-btns button:hover { background: rgba(212,167,74,0.2); border-color: var(--accent); }
    #pauseBtn.paused { border-color: rgba(255,120,80,0.7); color: rgba(255,140,100,1); }

    /* ── Quote card ────────────────────────── */
    #quoteCard {
      position: fixed;
      inset: 44px 0 0 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1.5rem 1rem;
      pointer-events: none; /* children re-enable */
    }

    #quoteInner {
      background: rgba(8,14,26,0.82);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 18px;
      max-width: min(780px, 96vw);
      width: 100%;
      padding: 1.5rem 1.8rem 1.2rem;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    }

    /* Author area */
    #authorRow {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #authorImg {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
      filter: grayscale(20%) contrast(110%);
      background: #1a2535;
      flex-shrink: 0;
    }
    #authorImgPlaceholder {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: radial-gradient(ellipse at 30% 30%, rgba(212,167,74,0.35), #0e1a2a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    #authorName {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.03em;
    }
    #authorSource {
      font-size: 0.78rem;
      color: rgba(240,230,208,0.55);
      font-style: italic;
      margin-top: 0.15rem;
    }

    #tagBar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.25rem;
    }
    .tag-chip {
      font-size: 0.68rem;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      border: 1px solid rgba(212,167,74,0.35);
      color: rgba(240,230,208,0.6);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Quote text area */
    #quoteTextWrap {
      position: relative;
    }

    #bounceCanvas {
      position: absolute;
      top: 0; left: 0; right: 0;
      width: 100%;
      height: 70px;
      pointer-events: none;
      display: block;
    }

    #quoteText {
      padding-top: 70px;
      font-family: var(--quote-font);
      font-size: clamp(1.25rem, 3.5vw, 2rem);
      line-height: 1.45;
      color: #f0e6d0;
      letter-spacing: 0.01em;
    }

    .q-word {
      display: inline;
      cursor: default;
      transition: color 0.15s, text-shadow 0.15s;
      margin: 0 0.1em;
    }
    .q-word.active {
      color: var(--accent);
      text-shadow: 0 0 22px rgba(var(--accent-rgb), 0.7);
    }
    .q-word.context {
      color: rgba(240,230,208,0.45);
    }

    /* Progress dots */
    #quoteProgress {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.76rem;
      color: rgba(240,230,208,0.4);
    }
    #progressBar {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    #progressFill {
      height: 3px;
      background: linear-gradient(90deg, rgba(var(--accent-rgb),0.6), var(--accent));
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }

    /* Footer buttons */
    #cardFooter {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .card-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #f0e6d0;
      padding: 0.36rem 0.8rem;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      transition: background 0.18s;
    }
    .card-btn:hover { background: rgba(212,167,74,0.18); border-color: var(--accent); }
    .card-btn.primary { background: rgba(212,167,74,0.15); border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

  <!-- WebGL background -->
  <canvas id="bgCanvas"></canvas>

  <!-- Top nav -->
  <nav id="topNav">
    <a href="index.html">← Home</a>
    <span class="sep">|</span>
    <a href="gpu-gravity.html">Gravity</a>
    <span class="sep">|</span>
    <a href="fourier-lab.html">Fourier</a>
    <span class="sep">|</span>
    <a href="mercator-visualizer.html">Mercator</a>
    <span class="sep">|</span>
    <a href="wiki-news-reader.html">Reader</a>
    <span class="logo" style="margin-left:auto;margin-right:0.5rem">QUOTES</span>
    <button id="ctrlToggle" aria-label="Toggle controls">⚙ Controls</button>
  </nav>

  <!-- Controls drawer -->
  <aside id="controlsPanel" aria-label="Quote controls">
    <div>
      <div class="ctrl-label">Search quotes, topics, authors</div>
      <input type="search" id="searchInput" placeholder="e.g. patience, feynman, war...">
      <div id="searchResults"></div>
    </div>

    <div>
      <div class="ctrl-label">Font</div>
      <div id="fontPills">
        <button class="font-pill active" data-font="'Playfair Display', serif">Playfair</button>
        <button class="font-pill" data-font="'Bebas Neue', sans-serif">Bebas</button>
        <button class="font-pill" data-font="'Cinzel', serif">Cinzel</button>
        <button class="font-pill" data-font="'Space Grotesk', sans-serif">Space</button>
        <button class="font-pill" data-font="'Caveat', cursive">Caveat</button>
        <button class="font-pill" data-font="'Orbitron', monospace">Orbit</button>
        <button class="font-pill" data-font="'Cormorant Garamond', serif">Cormorant</button>
        <button class="font-pill" data-font="'Pacifico', cursive">Pacifico</button>
      </div>
    </div>

    <div>
      <div class="ctrl-label">Background Effect</div>
      <select id="effectPicker" class="ctrl-select">
        <option value="0">✦ Cosmos</option>
        <option value="1">〜 Plasma</option>
        <option value="2">≋ Waves</option>
        <option value="3">⊞ Circuit</option>
      </select>
    </div>

    <div>
      <div class="ctrl-label">Speed — <span id="wpmLabel">80</span> WPM</div>
      <input type="range" id="wpmRange" min="30" max="360" value="80">
    </div>

    <div class="nav-btns">
      <button onclick="prevQuote()">← Prev</button>
      <button class="primary" onclick="randomQuote()">⟳ Random</button>
      <button onclick="nextQuote()">Next →</button>
      <button id="pauseBtn" onclick="togglePause()">Pause</button>
    </div>
  </aside>

  <!-- Main quote card -->
  <div id="quoteCard">
    <div id="quoteInner">
      <div id="authorRow">
        <div id="authorImgPlaceholder" aria-hidden="true">💬</div>
        <img id="authorImg" alt="" hidden>
        <div>
          <div id="authorName">Loading…</div>
          <div id="authorSource"></div>
          <div id="tagBar"></div>
        </div>
      </div>

      <div id="quoteTextWrap">
        <canvas id="bounceCanvas"></canvas>
        <div id="quoteText"></div>
      </div>

      <div id="quoteProgress">
        <div id="progressBar"><div id="progressFill"></div></div>
        <span id="progressLabel">0 / 0</span>
      </div>

      <div id="cardFooter">
        <button class="card-btn" onclick="prevQuote()">← Prev</button>
        <button class="card-btn primary" onclick="randomQuote()">⟳ Random</button>
        <button class="card-btn" onclick="nextQuote()">Next →</button>
        <button class="card-btn" id="pauseBtn2" onclick="togglePause()">Pause</button>
      </div>
    </div>
  </div>

  <script src="quotes-bounce.js"></script>
</body>
</html>
