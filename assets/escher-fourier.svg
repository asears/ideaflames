<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Escher-style Fourier Tiling</title>
  <desc id="desc">A highly detailed Escher-inspired Fourier and wave composition in a mid-century modern palette.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f0e2"/>
      <stop offset="100%" stop-color="#e2d7c0"/>
    </linearGradient>
    <pattern id="hexField" width="104" height="90" patternUnits="userSpaceOnUse">
      <polygon points="52,0 104,26 104,64 52,90 0,64 0,26" fill="#2f6f73" fill-opacity="0.26"/>
      <polygon points="52,9 95,31 95,59 52,81 9,59 9,31" fill="#d4a74a" fill-opacity="0.42"/>
      <circle cx="52" cy="45" r="9" fill="#bf5b39" fill-opacity="0.5"/>
    </pattern>
    <pattern id="diag" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <rect width="30" height="30" fill="none"/>
      <path d="M0,15 L30,15" stroke="#1f2a37" stroke-width="1" stroke-opacity="0.14"/>
    </pattern>
  </defs>

  <rect width="1400" height="900" fill="url(#paper)"/>
  <rect width="1400" height="900" fill="url(#hexField)" opacity="0.86"/>
  <rect width="1400" height="900" fill="url(#diag)" opacity="0.7"/>

  <g transform="translate(700 450)">
