<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2535"/>
      <stop offset="100%" stop-color="#0e1622"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a74a"/>
      <stop offset="100%" stop-color="#f8e8c8"/>
    </linearGradient>
    <pattern id="hex" x="0" y="0" width="36" height="31.2" patternUnits="userSpaceOnUse">
      <polygon points="18,0 36,9 36,27 18,36 0,27 0,9" fill="none" stroke="rgba(212,167,74,0.12)" stroke-width="0.8"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a74a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4a74a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#hex)"/>

  <!-- Central glow -->
  <ellipse cx="200" cy="130" rx="110" ry="70" fill="url(#glow)"/>

  <!-- Orbiting quote bubble paths (Escher-style tessellated arcs) -->
  <!-- Outer decorative ring arcs -->
  <path d="M 60,80 Q 120,30 180,50" fill="none" stroke="rgba(212,167,74,0.35)" stroke-width="1.5" stroke-dasharray="4,4"/>
  <path d="M 220,50 Q 290,30 340,80" fill="none" stroke="rgba(212,167,74,0.35)" stroke-width="1.5" stroke-dasharray="4,4"/>
  <path d="M 340,180 Q 290,225 220,210" fill="none" stroke="rgba(212,167,74,0.35)" stroke-width="1.5" stroke-dasharray="4,4"/>
  <path d="M 180,210 Q 110,225 60,180" fill="none" stroke="rgba(212,167,74,0.35)" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Tessellated diamond tiles (author portrait mosaic) -->
  <!-- Left column diamonds -->
  <polygon points="48,100 80,82 112,100 80,118" fill="rgba(212,167,74,0.06)" stroke="rgba(212,167,74,0.22)" stroke-width="0.9"/>
  <polygon points="80,82 112,64 144,82 112,100" fill="rgba(212,167,74,0.04)" stroke="rgba(212,167,74,0.18)" stroke-width="0.9"/>
  <polygon points="48,136 80,118 112,136 80,154" fill="rgba(212,167,74,0.04)" stroke="rgba(212,167,74,0.18)" stroke-width="0.9"/>

  <!-- Right column diamonds -->
  <polygon points="288,100 320,82 352,100 320,118" fill="rgba(212,167,74,0.06)" stroke="rgba(212,167,74,0.22)" stroke-width="0.9"/>
  <polygon points="256,82 288,64 320,82 288,100" fill="rgba(212,167,74,0.04)" stroke="rgba(212,167,74,0.18)" stroke-width="0.9"/>
  <polygon points="288,136 320,118 352,136 320,154" fill="rgba(212,167,74,0.04)" stroke="rgba(212,167,74,0.18)" stroke-width="0.9"/>

  <!-- Central quote card frame -->
  <rect x="108" y="72" width="184" height="116" rx="10" fill="rgba(10,16,28,0.75)" stroke="rgba(212,167,74,0.5)" stroke-width="1.2"/>

  <!-- Bouncing ball dots (karaoke trail) -->
  <circle cx="140" cy="88" r="4.5" fill="rgba(212,167,74,0.7)"/>
  <circle cx="165" cy="83" r="3.5" fill="rgba(212,167,74,0.5)"/>
  <circle cx="192" cy="82" r="5" fill="#d4a74a"/>
  <circle cx="220" cy="83" r="3.5" fill="rgba(212,167,74,0.5)"/>
  <circle cx="248" cy="88" r="4.5" fill="rgba(212,167,74,0.7)"/>
  <!-- Vertical dots below ball -->
  <line x1="192" y1="87" x2="192" y2="99" stroke="rgba(212,167,74,0.4)" stroke-width="1.5" stroke-dasharray="2,3"/>

  <!-- Quote text lines (abstracted) -->
  <rect x="124" y="102" width="152" height="5" rx="2.5" fill="rgba(248,232,200,0.55)"/>
  <rect x="124" y="115" width="138" height="4" rx="2" fill="rgba(248,232,200,0.35)"/>
  <rect x="124" y="127" width="148" height="4" rx="2" fill="rgba(248,232,200,0.35)"/>
  <rect x="124" y="139" width="110" height="4" rx="2" fill="rgba(248,232,200,0.25)"/>

  <!-- Author portrait silhouette (small circle) -->
  <circle cx="140" cy="158" r="9" fill="rgba(212,167,74,0.15)" stroke="rgba(212,167,74,0.4)" stroke-width="1"/>
  <circle cx="140" cy="155" r="3.5" fill="rgba(212,167,74,0.4)"/>
  <path d="M 132,165 Q 140,161 148,165" fill="rgba(212,167,74,0.3)" stroke="none"/>

  <!-- Author name line -->
  <rect x="154" y="154" width="70" height="4" rx="2" fill="rgba(212,167,74,0.5)"/>
  <rect x="154" y="162" width="50" height="3" rx="1.5" fill="rgba(248,232,200,0.25)"/>

  <!-- Tag chips -->
  <rect x="124" y="174" width="38" height="8" rx="4" fill="none" stroke="rgba(212,167,74,0.35)" stroke-width="0.9"/>
  <rect x="168" y="174" width="44" height="8" rx="4" fill="none" stroke="rgba(212,167,74,0.25)" stroke-width="0.9"/>
  <rect x="218" y="174" width="32" height="8" rx="4" fill="none" stroke="rgba(212,167,74,0.25)" stroke-width="0.9"/>

  <!-- Stars scattered (cosmos effect suggestion) -->
  <circle cx="30" cy="30" r="1.2" fill="rgba(248,232,200,0.7)"/>
  <circle cx="75" cy="50" r="0.9" fill="rgba(248,232,200,0.5)"/>
  <circle cx="350" cy="25" r="1.4" fill="rgba(248,232,200,0.8)"/>
  <circle cx="380" cy="55" r="1.0" fill="rgba(248,232,200,0.5)"/>
  <circle cx="20" cy="200" r="1.1" fill="rgba(248,232,200,0.6)"/>
  <circle cx="370" cy="210" r="0.9" fill="rgba(248,232,200,0.5)"/>
  <circle cx="320" cy="240" r="1.3" fill="rgba(248,232,200,0.6)"/>
  <circle cx="60" cy="240" r="1.0" fill="rgba(248,232,200,0.5)"/>

  <!-- Bottom decorative wave (speech rhythm) -->
  <path d="M 30,230 Q 70,218 110,228 Q 150,238 190,225 Q 230,212 270,224 Q 310,236 350,222 Q 380,212 395,218"
        fill="none" stroke="rgba(212,167,74,0.25)" stroke-width="1.5"/>
  <path d="M 30,240 Q 70,228 110,238 Q 150,248 190,235 Q 230,222 270,234 Q 310,246 350,232"
        fill="none" stroke="rgba(212,167,74,0.12)" stroke-width="1"/>

  <!-- Corner accent: tessellated triangle fans -->
  <g opacity="0.3">
    <line x1="10" y1="10" x2="40" y2="10" stroke="#d4a74a" stroke-width="0.8"/>
    <line x1="10" y1="10" x2="10" y2="40" stroke="#d4a74a" stroke-width="0.8"/>
    <line x1="10" y1="10" x2="35" y2="35" stroke="#d4a74a" stroke-width="0.8"/>
  </g>
  <g opacity="0.3">
    <line x1="390" y1="10" x2="360" y2="10" stroke="#d4a74a" stroke-width="0.8"/>
    <line x1="390" y1="10" x2="390" y2="40" stroke="#d4a74a" stroke-width="0.8"/>
    <line x1="390" y1="10" x2="365" y2="35" stroke="#d4a74a" stroke-width="0.8"/>
  </g>
  <g opacity="0.3">
    <line x1="10" y1="250" x2="40" y2="250" stroke="#d4a74a" stroke-width="0.8"/>
    <line x1="10" y1="250" x2="10" y2="220" stroke="#d4a74a" stroke-width="0.8"/>
    <line x1="10" y1="250" x2="35" y2="225" stroke="#d4a74a" stroke-width="0.8"/>
  </g>
</svg>
