<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Escher-style News Reader Geometry</title>
  <desc id="desc">Detailed geometric artwork evoking newspaper columns and flowing text in a mid-century modern palette.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4ecd9"/>
      <stop offset="100%" stop-color="#dcc9a8"/>
    </linearGradient>
    <pattern id="tiles" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="none"/>
      <rect x="0" y="0" width="60" height="60" fill="#2f6f73" fill-opacity="0.24"/>
      <rect x="60" y="0" width="60" height="60" fill="#bf5b39" fill-opacity="0.24"/>
      <rect x="0" y="60" width="60" height="60" fill="#d4a74a" fill-opacity="0.3"/>
      <rect x="60" y="60" width="60" height="60" fill="#7f8f58" fill-opacity="0.22"/>
    </pattern>
    <pattern id="micro" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M0,24 L24,0" stroke="#1f2a37" stroke-opacity="0.1" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect width="1400" height="900" fill="url(#tiles)"/>
  <rect width="1400" height="900" fill="url(#micro)"/>

  <g transform="translate(700 450)">
    <rect x="-510" y="-280" width="1020" height="560" rx="32" fill="#1f2a37" fill-opacity="0.1" stroke="#1f2a37" stroke-opacity="0.4" stroke-width="4"/>

    <g fill="#1f2a37" fill-opacity="0.75">
      <rect x="-450" y="-220" width="26" height="390"/>
      <rect x="-408" y="-195" width="26" height="365"/>
      <rect x="-366" y="-236" width="26" height="406"/>
      <rect x="-324" y="-170" width="26" height="340"/>
      <rect x="-282" y="-212" width="26" height="382"/>
      <rect x="-240" y="-188" width="26" height="358"/>
      <rect x="-198" y="-228" width="26" height="398"/>
      <rect x="-156" y="-160" width="26" height="330"/>
      <rect x="-114" y="-210" width="26" height="380"/>
      <rect x="-72" y="-184" width="26" height="354"/>
      <rect x="-30" y="-230" width="26" height="400"/>
      <rect x="12" y="-176" width="26" height="346"/>
      <rect x="54" y="-220" width="26" height="390"/>
      <rect x="96" y="-166" width="26" height="336"/>
