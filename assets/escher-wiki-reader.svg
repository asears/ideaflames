    <g fill="none" stroke-width="4.4">
      <path d="M-520,-52 C-410,-160 -300,-160 -190,-52 C-80,56 30,56 140,-52 C250,-160 360,-160 470,-52 C580,56 690,56 800,-52" stroke="#bf5b39" stroke-opacity="0.82"/>
      <path d="M-520,22 C-410,-70 -300,-70 -190,22 C-80,114 30,114 140,22 C250,-70 360,-70 470,22 C580,114 690,114 800,22" stroke="#2f6f73" stroke-opacity="0.8"/>
    </g>

    <g fill="#d4a74a" fill-opacity="0.74" stroke="#1f2a37" stroke-opacity="0.4" stroke-width="1.4">
